<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#1565c0">
<title>Transformations du plan · IKE Simulations</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { height:100%; overflow:hidden; }
  body {
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    background:#f4f7fb; color:#263238;
    display:flex; flex-direction:column;
    user-select:none; -webkit-user-select:none; touch-action:manipulation;
  }

  /* ---------- Écran de démarrage IKE ---------- */
  #splash {
    position:fixed; inset:0; z-index:100;
    background:linear-gradient(160deg,#0d47a1 0%,#1565c0 55%,#1e88e5 100%);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    transition:opacity .5s ease;
  }
  #splash.fini { opacity:0; pointer-events:none; }
  #splash .logo {
    font-size:56px; line-height:1;
    animation:battement 1.1s ease-in-out infinite;
    filter:drop-shadow(0 4px 14px rgba(255,202,40,.45));
  }
  @keyframes battement { 50% { transform:scale(1.18); } }
  #splash .nom { margin-top:14px; color:#fff; font-size:30px; font-weight:800; letter-spacing:.5px; }
  #splash .nom span { font-weight:300; opacity:.9; }
  #splash .sub {
    margin-top:4px; color:rgba(255,255,255,.75); font-size:13px;
    letter-spacing:2px; text-transform:uppercase;
  }
  #splash .barre {
    margin-top:22px; width:150px; height:4px; border-radius:2px;
    background:rgba(255,255,255,.25); overflow:hidden;
  }
  #splash .rempl {
    height:100%; background:#ffca28; border-radius:2px;
    transform-origin:left; transform:scaleX(0); animation:charge 1.3s ease-out forwards;
  }
  @keyframes charge { to { transform:scaleX(1); } }
  #splash .ver { position:absolute; bottom:14px; color:rgba(255,255,255,.5); font-size:11px; }

  /* ---------- En-tête ---------- */
  header {
    display:flex; align-items:center; gap:8px;
    padding:8px 12px; background:#fff; border-bottom:1px solid #e0e6ed;
    flex:none; z-index:5;
  }
  header h1 { font-size:16px; font-weight:700; color:#1565c0; white-space:nowrap; }
  header .spacer { flex:1; }
  .btn {
    border:1px solid #cfd8dc; background:#fff; color:#37474f;
    border-radius:8px; padding:8px 10px; font-size:13px; font-weight:600;
    cursor:pointer; white-space:nowrap; min-height:40px;
  }
  .btn:active { background:#e3f2fd; }
  @media (max-width:480px) { .btn .lbl { display:none; } header h1 { font-size:13px; } }

  /* ---------- Barre de mission ---------- */
  #mbar { flex:none; background:#fff; border-bottom:1px solid #e0e6ed; padding:6px 10px; z-index:4; }
  #mbar .l1 { display:flex; align-items:center; gap:8px; }
  #mchip {
    background:#1565c0; color:#fff; font-size:11px; font-weight:700;
    border-radius:12px; padding:3px 9px; white-space:nowrap;
  }
  #mtitre {
    font-size:13.5px; font-weight:700; color:#263238; flex:1;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }
  #mbar .mbtn {
    border:1px solid #cfd8dc; background:#fff; border-radius:8px;
    font-size:14px; padding:4px 10px; cursor:pointer; min-height:34px;
  }
  #mbar .l2 { display:flex; align-items:center; gap:8px; margin-top:5px; }
  #mbar.flash { animation:flashvert .9s ease; }
  @keyframes flashvert { 0% { background:#c8e6c9; } 100% { background:#fff; } }
  #mpoints { display:flex; gap:5px; align-items:center; flex:none; }
  #mpoints .pt { width:9px; height:9px; border-radius:50%; background:#cfd8dc; }
  #mpoints .pt.faite { background:#2e7d32; }
  #mpoints .pt.courante { background:#1565c0; animation:ptpulse 1.6s infinite; }
  @keyframes ptpulse { 50% { transform:scale(1.4); } }
  #metape { flex:1; font-size:12.5px; color:#37474f; line-height:1.4; }
  #metape.glisse { animation:glisse .4s ease; }
  @keyframes glisse { from { opacity:0; transform:translateX(12px); } }
  #mcompteur { font-size:11px; color:#90a4ae; font-weight:700; white-space:nowrap; }
  #btn-indice {
    background:#fff8e1 !important; border-color:#ffca28 !important;
    color:#795548; font-weight:700; white-space:nowrap;
  }
  #btn-indice.pulse { animation:indicepulse 1.2s infinite; }
  @keyframes indicepulse {
    50% { transform:scale(1.08); box-shadow:0 0 0 7px rgba(255,202,40,.3); }
  }
  #btn-suiv2 {
    background:#1565c0 !important; border-color:#1565c0 !important;
    color:#fff !important; font-weight:700; white-space:nowrap;
  }
  #mindice {
    display:none; margin-top:6px; background:#fff8e1; border:1px solid #ffe082;
    color:#795548; font-size:12.5px; border-radius:8px; padding:7px 10px; line-height:1.45;
  }
  #mindice.visible { display:block; }
  #mdiag {
    display:none; margin-top:6px; background:#fff3e0; border:1px solid #ffcc80;
    color:#bf360c; font-size:12.5px; border-radius:8px; padding:7px 10px; line-height:1.45;
  }
  #mdiag.visible { display:block; animation:glisse .4s ease; }

  /* ---------- Scène ---------- */
  #wrap { flex:1; position:relative; overflow:hidden; }
  canvas#scene { position:absolute; inset:0; width:100%; height:100%; touch-action:none; display:block; }

  #formule {
    position:absolute; top:10px; right:10px; z-index:5;
    background:rgba(255,255,255,.94); border:1px solid #cfd8dc; border-radius:12px;
    padding:10px 12px; max-width:min(255px, 54vw);
    font-size:12px; line-height:1.6; color:#37474f;
    box-shadow:0 3px 12px rgba(0,0,0,.12);
  }
  #formule .ftitre {
    font-size:11px; font-weight:800; letter-spacing:.5px; color:#1565c0;
    text-transform:uppercase; margin-bottom:4px;
  }
  #formule .fmath {
    font-family:Consolas, "Courier New", monospace; font-size:11.5px;
    background:#f4f7fb; border-radius:6px; padding:2px 6px; margin:2px 0;
    white-space:nowrap; overflow-x:auto; display:block;
  }
  #formule .fok { font-weight:800; color:#2e7d32; }
  #formule .fnote { font-size:11px; color:#90a4ae; font-style:italic; }
  #formule .flex {
    display:block; margin-top:6px; font-size:11px; font-weight:700;
    color:#1565c0; text-decoration:underline; cursor:pointer;
    background:none; border:none; padding:0;
  }
  .lex { margin-bottom:10px; }
  .lex dt { font-size:13px; font-weight:800; color:#1565c0; margin-top:10px; }
  .lex dd { font-size:12.5px; line-height:1.5; color:#37474f; margin:2px 0 0; }

  #toast {
    position:absolute; bottom:16px; left:50%;
    transform:translateX(-50%) translateY(10px) scale(.9);
    background:#2e7d32; color:#fff; font-size:14.5px; font-weight:800;
    padding:11px 22px; border-radius:22px; opacity:0; pointer-events:none;
    transition:opacity .25s, transform .3s cubic-bezier(.34,1.56,.64,1);
    box-shadow:0 6px 20px rgba(46,125,50,.4); z-index:6; white-space:nowrap;
  }
  #toast.visible { opacity:1; transform:translateX(-50%) translateY(0) scale(1); }

  /* ---------- Barre d'outils (transformations) ---------- */
  nav#palette {
    flex:none; display:flex; justify-content:center; align-items:center; gap:6px;
    padding:6px 8px calc(6px + env(safe-area-inset-bottom));
    background:#fff; border-top:1px solid #e0e6ed; overflow-x:auto; z-index:5;
  }
  nav#palette button {
    display:flex; flex-direction:column; align-items:center; gap:2px;
    border:2px solid transparent; border-radius:10px; background:#f4f7fb;
    padding:7px 9px 5px; min-width:62px; min-height:54px; cursor:pointer;
  }
  nav#palette button.actif { border-color:#1565c0; background:#e3f2fd; }
  nav#palette button .ico { font-size:17px; line-height:1; }
  nav#palette button .nomm { font-size:9.5px; font-weight:700; color:#37474f; white-space:nowrap; }
  #btn-reset-fig {
    border:2px solid #cfd8dc !important; background:#fff !important;
    font-size:12px; font-weight:700; color:#546e7a; min-width:auto !important;
  }

  /* ---------- Voiles ---------- */
  .voile {
    position:fixed; inset:0; background:rgba(38,50,56,.55);
    display:none; align-items:center; justify-content:center; z-index:20; padding:16px;
  }
  .voile.visible { display:flex; }
  .voile .carte {
    position:relative;
    background:#fff; border-radius:16px; padding:22px; max-width:400px; width:100%;
    max-height:86vh; overflow-y:auto; box-shadow:0 10px 40px rgba(0,0,0,.3);
  }
  .fermer-x {
    position:absolute; top:8px; right:10px; border:none; background:none;
    font-size:20px; line-height:1; color:#90a4ae; cursor:pointer; padding:6px 8px;
  }
  .voile .carte h2 { font-size:18px; color:#1565c0; margin-bottom:12px; }
  .voile.visible .carte h2 { animation:pop .4s ease-out; }
  @keyframes pop { 0% { transform:scale(.5); opacity:0; } 80% { transform:scale(1.08); } 100% { transform:scale(1); } }
  .voile .go {
    width:100%; border:none; background:#1565c0; color:#fff; font-size:15px; font-weight:700;
    padding:12px; border-radius:10px; cursor:pointer;
  }
  .voile .btn2 {
    width:100%; border:1px solid #cfd8dc; background:#fff; color:#37474f;
    font-size:13px; font-weight:600; padding:10px; border-radius:10px;
    cursor:pointer; margin-top:8px;
  }
  .voile .lien {
    display:block; width:100%; text-align:center; margin-top:10px;
    background:none; border:none; color:#90a4ae; font-size:11.5px;
    text-decoration:underline; cursor:pointer;
  }
  #mfin-titre { font-weight:700; font-size:15px; color:#263238; margin-bottom:10px; }
  .retenir-label { font-size:12px; font-weight:800; color:#2e7d32; margin-bottom:4px; }
  #mfin-retenir {
    background:#e8f5e9; border-radius:10px; padding:10px 12px;
    font-size:13.5px; line-height:1.55; color:#1b5e20; margin:0 0 14px;
  }
  .mrow {
    display:flex; align-items:center; gap:8px; width:100%;
    border:none; background:#f4f7fb; border-radius:8px; padding:10px;
    margin-bottom:5px; font-size:13px; cursor:pointer; text-align:left; color:#263238;
  }
  .mrow .n { font-weight:700; color:#90a4ae; min-width:22px; }
  .mrow.faite .n { color:#2e7d32; }
  .mrow.courante { outline:2px solid #1565c0; background:#e3f2fd; }
  .mrow .t { flex:1; }

  /* ---------- Visite guidée ---------- */
  #visite { position:fixed; inset:0; z-index:30; display:none; }
  #visite.sombre { background:rgba(38,50,56,.62); }
  #visite-halo {
    position:absolute; border-radius:12px; border:2px solid #ffca28;
    box-shadow:0 0 0 9999px rgba(38,50,56,.62);
    transition:all .3s ease; pointer-events:none;
  }
  #visite-carte {
    position:absolute; background:#fff; border-radius:14px; padding:16px;
    width:min(310px, calc(100vw - 24px)); box-shadow:0 10px 40px rgba(0,0,0,.35);
  }
  .vtitre { font-size:15px; font-weight:800; color:#1565c0; margin-bottom:6px; }
  .vtexte { font-size:13px; line-height:1.55; color:#37474f; white-space:pre-line; }
  .vbas { display:flex; align-items:center; gap:10px; margin-top:12px; }
  .vprog { flex:1; font-size:11px; font-weight:700; color:#90a4ae; }
  #visite-passer {
    background:none; border:none; color:#90a4ae; font-size:12px;
    text-decoration:underline; cursor:pointer; padding:6px;
  }
  #visite-suivant {
    border:none; background:#1565c0; color:#fff; font-weight:700;
    font-size:13px; padding:9px 18px; border-radius:9px; cursor:pointer;
  }
  .vmarque { margin-top:10px; text-align:center; font-size:10px; color:#b0bec5; }

  /* ==================== THÈME SOMBRE ==================== */
  body.sombre { background:#10181f; color:#eceff1; }
  body.sombre header,
  body.sombre #mbar,
  body.sombre nav#palette { background:#1c262e; border-color:#2c3a45; }
  body.sombre header h1 { color:#64b5f6; }
  body.sombre .btn { background:#22303a; border-color:#3a4a56; color:#cfd8dc; }
  body.sombre .btn:active { background:#0d2c4f; }
  body.sombre #mtitre { color:#eceff1; }
  body.sombre #metape { color:#cfd8dc; }
  body.sombre #mbar .mbtn { background:#22303a; border-color:#3a4a56; color:#cfd8dc; }
  body.sombre #btn-indice { background:#3a3220 !important; border-color:#8d6e63 !important; color:#ffd54f; }
  body.sombre #mindice { background:#2b2618; border-color:#5d4d1a; color:#ffe082; }
  body.sombre #mdiag { background:#33261a; border-color:#7a5c3d; color:#ffcc80; }
  body.sombre #mpoints .pt { background:#3a4a56; }
  body.sombre #mpoints .pt.faite { background:#66bb6a; }
  body.sombre #mpoints .pt.courante { background:#64b5f6; }
  body.sombre #mbar.flash { animation-name:flashvert-sombre; }
  @keyframes flashvert-sombre { 0% { background:#1b3a22; } 100% { background:#1c262e; } }
  body.sombre nav#palette button { background:#22303a; }
  body.sombre nav#palette button .nomm { color:#cfd8dc; }
  body.sombre nav#palette button.actif { background:#0d2c4f; border-color:#64b5f6; }
  body.sombre #btn-reset-fig { background:#22303a !important; border-color:#3a4a56 !important; color:#b0bec5; }
  body.sombre #formule { background:rgba(28,38,46,.95); border-color:#3a4a56; color:#cfd8dc; }
  body.sombre #formule .ftitre { color:#64b5f6; }
  body.sombre #formule .fmath { background:#10181f; }
  body.sombre #formule .fok { color:#81c784; }
  body.sombre #formule .flex { color:#64b5f6; }
  body.sombre .lex dt { color:#64b5f6; }
  body.sombre .lex dd { color:#cfd8dc; }
  body.sombre .voile .carte, body.sombre #visite-carte { background:#1c262e; }
  body.sombre .voile .carte h2, body.sombre .vtitre { color:#64b5f6; }
  body.sombre .vtexte { color:#cfd8dc; }
  body.sombre .voile .btn2 { background:#22303a; border-color:#3a4a56; color:#cfd8dc; }
  body.sombre #mfin-titre { color:#eceff1; }
  body.sombre .retenir-label { color:#81c784; }
  body.sombre #mfin-retenir { background:#16281a; color:#a5d6a7; }
  body.sombre .mrow { background:#26313a; color:#eceff1; }
  body.sombre .mrow.courante { background:#0d2c4f; outline-color:#64b5f6; }
</style>
</head>
<body>

<div id="splash">
  <div class="logo">⚡</div>
  <div class="nom">IKE <span>Simulations</span></div>
  <div class="sub">Sciences au collège</div>
  <div class="barre"><div class="rempl"></div></div>
  <div class="ver">v2.8.0</div>
</div>

<header>
  <h1>🔺 Transformations du plan</h1>
  <div class="spacer"></div>
  <button class="btn" id="btn-formule">📐<span class="lbl"> Propriétés</span></button>
  <button class="btn" id="btn-theme">🌙<span class="lbl"> Sombre</span></button>

</header>

<div id="mbar">
  <div class="l1">
    <span id="mchip"></span>
    <span id="mtitre"></span>
    <button class="mbtn" id="btn-missions" title="Toutes les missions">📋</button>
  </div>
  <div class="l2">
    <span id="mpoints"></span>
    <span id="metape"></span>
    <span id="mcompteur"></span>
    <button class="mbtn" id="btn-indice" title="Indice">💡 Indice</button>

  <canvas id="scene"></canvas>

</div>

<nav id="palette"></nav>

<div id="mlecon" class="voile">
  <div class="carte">
    <h2>📖 Avant de commencer…</h2>
    <div id="mlecon-titre" style="font-weight:700; font-size:15px; margin-bottom:10px;"></div>
    <p id="mlecon-texte" style="font-size:14px; line-height:1.65; margin-bottom:14px;"></p>
    <button class="go" id="btn-go-lecon">C'est parti !</button>
  </div>
</div>

<div id="mlexique" class="voile">
  <div class="carte">
    <h2>📖 Lexique de la géométrie</h2>
    <dl class="lex" id="lex-items"></dl>
    <button class="go" id="btn-fermer-lexique">Fermer</button>

      <span class="vprog"></span>
      <button id="visite-passer">Passer</button>
      <button id="visite-suivant">Suivant</button>
    </div>
    <div class="vmarque">IKE Simulations · collège (Maths)</div>
  </div>
</div>

<script>
'use strict';
/* =====================================================================
   TRANSFORMATIONS DU PLAN — SA « Applications du plan » (6ᵉ → 3ᵉ)
   ---------------------------------------------------------------------
   L'élève déplace l'élément de la transformation (axe, centre, vecteur) ;
   l'image de la figure se construit en direct, avec les traits de
   construction. Le panneau 📐 vérifie les propriétés (longueurs, aires,
   orientation) en permanence.
   ===================================================================== */

/* ---------- 1. Moteur géométrique (fonctions pures, testées) ---------- */

const symAxeV = (p, a) => ({ x: 2 * a - p.x, y: p.y });
const symAxeH = (p, a) => ({ x: p.x, y: 2 * a - p.y });
const symCentre = (p, c) => ({ x: 2 * c.x - p.x, y: 2 * c.y - p.y });
const translation = (p, v) => ({ x: p.x + v.x, y: p.y + v.y });
function rotation(p, c, a) {
  const dx = p.x - c.x, dy = p.y - c.y;
  const co = Math.cos(a), si = Math.sin(a);
  return { x: c.x + dx * co - dy * si, y: c.y + dx * si + dy * co };
}
const dist = (a, b) => Math.hypot(b.x - a.x, b.y - a.y);
function aireSignee(pts) {
  let s = 0;
  for (let i = 0; i < pts.length; i++) {
    const a = pts[i], b = pts[(i + 1) % pts.length];
    s += a.x * b.y - b.x * a.y;
  }
  return s / 2;
}
const arrondi = v => Math.round(v * 100) / 100;

/* ---------- 2. État ---------- */

// Figure « L » : ses sommets sont nommés A, B, C, D, E
const FIG_INIT = [{x:2,y:2},{x:5,y:2},{x:5,y:3},{x:3,y:3},{x:3,y:6}];
const NOMS = ['A', 'B', 'C', 'D', 'E'];

const TRANSFOS = [
  { id:'axialeV',  ico:'🪞', nom:'Sym. axiale' },
  { id:'centrale', ico:'🎯', nom:'Sym. centrale' },
  { id:'translation', ico:'➡️', nom:'Translation' },
  { id:'rotation', ico:'🔄', nom:'Rotation' },
];

const etat = {
  fig: FIG_INIT.map(p => ({ ...p })),
  transfo: 'axialeV',
  axeX: 8,                       // symétrie axiale : abscisse de l'axe vertical
  centre: { x: 8, y: 4 },        // symétries centrale et rotation
  vecteur: { x: 5, y: 2 },       // translation
  angle: 90,                     // rotation (degrés, sens direct)
  theme: 'clair',
};

const suivi = {
  axesEssayes: new Set(),
  centresEssayes: new Set(),
  vecteursEssayes: new Set(),
  anglesEssayes: new Set(),
  transfosVues: [],
  sommetSurAxe: false,
  vecteurNul: false,
  rot180Faite: false,
};
function resetSuivi() {
  suivi.axesEssayes.clear(); suivi.centresEssayes.clear();
  suivi.vecteursEssayes.clear(); suivi.anglesEssayes.clear();
  suivi.transfosVues = [etat.transfo];
  suivi.sommetSurAxe = false; suivi.vecteurNul = false; suivi.rot180Faite = false;
}

// Image de la figure selon la transformation en cours
function image() {
  const f = etat.fig;
  switch (etat.transfo) {
    case 'axialeV': return f.map(p => symAxeV(p, etat.axeX));
    case 'centrale': return f.map(p => symCentre(p, etat.centre));
    case 'translation': return f.map(p => translation(p, etat.vecteur));
    case 'rotation': return f.map(p => rotation(p, etat.centre, etat.angle * Math.PI / 180));
  }
  return f;
}

/* ---------- 3. Repère : unités ↔ pixels ---------- */

const canvas = document.getElementById('scene');
const ctx = canvas.getContext('2d');
let largeur = 0, hauteur = 0, u = 24, ox = 0, oy = 0;   // u = taille d'un carreau
const UX_MAX = 22, UY_MAX = 12;                          // étendue du quadrillage

function redimensionner() {
  const wrap = document.getElementById('wrap');
  largeur = wrap.clientWidth; hauteur = wrap.clientHeight;
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  canvas.width = Math.round(largeur * dpr);
  canvas.height = Math.round(hauteur * dpr);
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  u = Math.min(largeur / (UX_MAX + 1), hauteur / (UY_MAX + 1));
  ox = (largeur - UX_MAX * u) / 2;
  oy = hauteur - (hauteur - UY_MAX * u) / 2;   // y vers le haut
  demanderRendu();
}
const px = x => ox + x * u;
const py = y => oy - y * u;
const ux = xpx => (xpx - ox) / u;
const uy = ypx => (oy - ypx) / u;

/* ---------- 4. Rendu ---------- */

const PALETTES = {
  clair: { grille:'#dde5ec', axes:'#b0bec5', texte:'#37474f', doux:'#90a4ae',
           fond:'#f4f7fb', figure:'#1565c0', figFond:'rgba(21,101,192,.14)' },
  sombre:{ grille:'#2c3a45', axes:'#3d4c59', texte:'#cfd8dc', doux:'#78909c',
           fond:'#10181f', figure:'#64b5f6', figFond:'rgba(100,181,246,.16)' },
};
const T = () => PALETTES[etat.theme];
const C_IMAGE = '#e53935', C_ELEM = '#8e24aa', C_CONSTR = 'rgba(142,36,170,.55)';

let renduDemande = true;
function demanderRendu() { renduDemande = true; }
function boucle() {
  if (renduDemande) { renduDemande = false; dessiner(); }
  requestAnimationFrame(boucle);
}

function trait(x1, y1, x2, y2, larg, coul, pointille) {
  ctx.strokeStyle = coul; ctx.lineWidth = larg; ctx.lineCap = 'round';
  if (pointille) ctx.setLineDash([5, 5]);
  ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
  ctx.setLineDash([]);
}

function polygone(pts, coul, fond, larg) {
  ctx.beginPath();
  pts.forEach((p, i) => i ? ctx.lineTo(px(p.x), py(p.y)) : ctx.moveTo(px(p.x), py(p.y)));
  ctx.closePath();
  if (fond) { ctx.fillStyle = fond; ctx.fill(); }
  ctx.strokeStyle = coul; ctx.lineWidth = larg || 2.5; ctx.lineJoin = 'round';
  ctx.stroke();
}

function sommets(pts, coul, primes) {
  ctx.font = 'bold 12px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  pts.forEach((p, i) => {
    ctx.fillStyle = coul;
    ctx.beginPath(); ctx.arc(px(p.x), py(p.y), 4, 0, 7); ctx.fill();
    ctx.fillStyle = T().fond;
    ctx.beginPath(); ctx.arc(px(p.x) + 11, py(p.y) - 11, 8, 0, 7); ctx.fill();
    ctx.fillStyle = coul;
    ctx.fillText(NOMS[i] + (primes ? '′' : ''), px(p.x) + 11, py(p.y) - 11);
  });
}

function dessiner() {
  const t = T();
  ctx.clearRect(0, 0, largeur, hauteur);

  // Quadrillage
  ctx.strokeStyle = t.grille; ctx.lineWidth = 1;
  for (let i = 0; i <= UX_MAX; i++) {
    ctx.beginPath(); ctx.moveTo(px(i), py(0)); ctx.lineTo(px(i), py(UY_MAX)); ctx.stroke();
  }
  for (let j = 0; j <= UY_MAX; j++) {
    ctx.beginPath(); ctx.moveTo(px(0), py(j)); ctx.lineTo(px(UX_MAX), py(j)); ctx.stroke();
  }
  trait(px(0), py(0), px(UX_MAX), py(0), 1.5, t.axes);
  trait(px(0), py(0), px(0), py(UY_MAX), 1.5, t.axes);

  const img = image();

  // Traits de construction (le cœur pédagogique !)
  ctx.save();
  if (etat.transfo === 'axialeV') {
    etat.fig.forEach((p, i) => {
      trait(px(p.x), py(p.y), px(img[i].x), py(img[i].y), 1.4, C_CONSTR, true);
      // codage de l'égalité des distances à l'axe
      const my = py(p.y);
      for (const [a, b] of [[p.x, etat.axeX], [etat.axeX, img[i].x]]) {
        const mx = px((a + b) / 2);
        trait(mx - 3, my - 4, mx + 3, my + 4, 1.4, C_CONSTR);
      }
    });
  } else if (etat.transfo === 'centrale' || etat.transfo === 'rotation') {
    etat.fig.forEach((p, i) => {
      if (etat.transfo === 'centrale') {
        trait(px(p.x), py(p.y), px(img[i].x), py(img[i].y), 1.4, C_CONSTR, true);
      } else {
        // arcs de rotation
        const r = dist(p, etat.centre);
        if (r > 0.05) {
          const a0 = Math.atan2(p.y - etat.centre.y, p.x - etat.centre.x);
          const a1 = a0 + etat.angle * Math.PI / 180;
          ctx.strokeStyle = C_CONSTR; ctx.lineWidth = 1.2;
          ctx.setLineDash([4, 4]);
          ctx.beginPath();
          ctx.arc(px(etat.centre.x), py(etat.centre.y), r * u,
            -a0, -a1, etat.angle > 0);
          ctx.stroke();
          ctx.setLineDash([]);
          trait(px(etat.centre.x), py(etat.centre.y), px(p.x), py(p.y), 1, C_CONSTR, true);
        }
      }
    });
  } else if (etat.transfo === 'translation') {
    etat.fig.forEach((p, i) => {
      const x1 = px(p.x), y1 = py(p.y), x2 = px(img[i].x), y2 = py(img[i].y);
      trait(x1, y1, x2, y2, 1.4, C_CONSTR, true);
      const a = Math.atan2(y2 - y1, x2 - x1);
      if (dist(p, img[i]) > 0.2) {
        ctx.fillStyle = C_CONSTR;
        ctx.beginPath();
        ctx.moveTo(x2, y2);
        ctx.lineTo(x2 - 8 * Math.cos(a - 0.4), y2 - 8 * Math.sin(a - 0.4));
        ctx.lineTo(x2 - 8 * Math.cos(a + 0.4), y2 - 8 * Math.sin(a + 0.4));
        ctx.fill();
      }
    });
  }
  ctx.restore();

  // Élément de la transformation (déplaçable)
  if (etat.transfo === 'axialeV') {
    trait(px(etat.axeX), py(-0.4), px(etat.axeX), py(UY_MAX + 0.4), 3, C_ELEM);
    etiquette(etat.axeX, UY_MAX + 0.7, '(d) axe — glisse-moi', C_ELEM);
  } else if (etat.transfo === 'centrale' || etat.transfo === 'rotation') {
    const cx = px(etat.centre.x), cy = py(etat.centre.y);
    ctx.strokeStyle = C_ELEM; ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.arc(cx, cy, 7, 0, 7); ctx.stroke();
    ctx.fillStyle = C_ELEM;
    ctx.beginPath(); ctx.arc(cx, cy, 3, 0, 7); ctx.fill();
    etiquette(etat.centre.x, etat.centre.y - 0.9,
      etat.transfo === 'rotation' ? `O (centre) · ${etat.angle}°` : 'O (centre) — glisse-moi', C_ELEM);
  } else if (etat.transfo === 'translation') {
    // vecteur, dessiné depuis un point d'origine visible
    const o = { x: 1, y: 8 };
    const b = { x: o.x + etat.vecteur.x, y: o.y + etat.vecteur.y };
    trait(px(o.x), py(o.y), px(b.x), py(b.y), 3, C_ELEM);
    const a = Math.atan2(py(b.y) - py(o.y), px(b.x) - px(o.x));
    ctx.fillStyle = C_ELEM;
    ctx.beginPath();
    ctx.moveTo(px(b.x), py(b.y));
    ctx.lineTo(px(b.x) - 11 * Math.cos(a - 0.4), py(b.y) - 11 * Math.sin(a - 0.4));
    ctx.lineTo(px(b.x) - 11 * Math.cos(a + 0.4), py(b.y) - 11 * Math.sin(a + 0.4));
    ctx.fill();
    ctx.beginPath(); ctx.arc(px(b.x), py(b.y), 9, 0, 7); ctx.strokeStyle = C_ELEM;
    ctx.lineWidth = 1.5; ctx.stroke();
    etiquette(b.x, b.y + 0.9,
      `vecteur (${etat.vecteur.x >= 0 ? '+' : ''}${etat.vecteur.x} ; ${etat.vecteur.y >= 0 ? '+' : ''}${etat.vecteur.y})`, C_ELEM);
  }

  // Image puis figure (la figure au-dessus)
  polygone(img, C_IMAGE, 'rgba(229,57,53,.12)', 2.5);
  sommets(img, C_IMAGE, true);
  polygone(etat.fig, t.figure, t.figFond, 2.8);
  sommets(etat.fig, t.figure, false);
}

function etiquette(xu, yu, txt, coul) {
  ctx.font = 'bold 11px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  const x = Math.max(50, Math.min(largeur - 50, px(xu)));
  const y = Math.max(12, Math.min(hauteur - 10, py(yu)));
  const w = ctx.measureText(txt).width;
  ctx.fillStyle = etat.theme === 'sombre' ? 'rgba(16,24,31,.85)' : 'rgba(244,247,251,.9)';
  ctx.fillRect(x - w / 2 - 4, y - 8, w + 8, 16);
  ctx.fillStyle = coul;
  ctx.fillText(txt, x, y);
}

/* ---------- 5. Interactions : glisser l'élément de la transformation ---------- */

let drag = null;

canvas.addEventListener('pointerdown', e => {
  e.preventDefault();
  canvas.setPointerCapture(e.pointerId);
  const r = canvas.getBoundingClientRect();
  const X = ux(e.clientX - r.left), Y = uy(e.clientY - r.top);
  if (etat.transfo === 'axialeV' && Math.abs(X - etat.axeX) < 1.2) drag = 'axe';
  else if ((etat.transfo === 'centrale' || etat.transfo === 'rotation') &&
           dist({ x: X, y: Y }, etat.centre) < 1.4) drag = 'centre';
  else if (etat.transfo === 'translation') {
    const b = { x: 1 + etat.vecteur.x, y: 8 + etat.vecteur.y };
    if (dist({ x: X, y: Y }, b) < 1.4) drag = 'vecteur';
  }
});

canvas.addEventListener('pointermove', e => {
  if (!drag) return;
  const r = canvas.getBoundingClientRect();
  const X = Math.max(0, Math.min(UX_MAX, Math.round(ux(e.clientX - r.left))));
  const Y = Math.max(0, Math.min(UY_MAX, Math.round(uy(e.clientY - r.top))));
  if (drag === 'axe') { etat.axeX = X; suivi.axesEssayes.add(X); }
  else if (drag === 'centre') { etat.centre = { x: X, y: Y }; suivi.centresEssayes.add(X + ';' + Y); }
  else if (drag === 'vecteur') {
    etat.vecteur = { x: X - 1, y: Y - 8 };
    suivi.vecteursEssayes.add(etat.vecteur.x + ';' + etat.vecteur.y);
    if (etat.vecteur.x === 0 && etat.vecteur.y === 0) suivi.vecteurNul = true;
  }
  // un sommet de la figure est-il sur l'axe ?
  if (etat.transfo === 'axialeV' && etat.fig.some(p => p.x === etat.axeX)) suivi.sommetSurAxe = true;
  demanderRendu(); majFormule(); evaluerMission();
});

canvas.addEventListener('pointerup', () => { drag = null; });
canvas.addEventListener('pointercancel', () => { drag = null; });
canvas.addEventListener('contextmenu', e => e.preventDefault());

let formuleVisible = true;

function majFormule() {
  const f = document.getElementById('formule');
  if (!formuleVisible) { f.style.display = 'none'; return; }
  f.style.display = '';
  const img = image();
  const l = [];
  const nomT = TRANSFOS.find(t => t.id === etat.transfo).nom;
  l.push(`<div class="ftitre">📐 ${nomT}</div>`);

  // Un sommet suivi : A → A′
  const A = etat.fig[0], Ap = img[0];
  l.push(`<span class="fmath">A (${A.x} ; ${A.y}) → A′ (${arrondi(Ap.x)} ; ${arrondi(Ap.y)})</span>`);

  // Propriétés vérifiées EN DIRECT
  const lAB = dist(etat.fig[0], etat.fig[1]), lApBp = dist(img[0], img[1]);
  const aire = Math.abs(aireSignee(etat.fig)), aireI = Math.abs(aireSignee(img));
  l.push(`<span class="fmath fok">AB = A′B′ = ${arrondi(lAB)} ✓</span>`);
  l.push(`<span class="fmath fok">aire = ${arrondi(aire)} = ${arrondi(aireI)} ✓</span>`);

  const memeSens = aireSignee(etat.fig) * aireSignee(img) > 0;
  l.push(`<span class="fmath">sens : ${memeSens ? 'conservé' : 'INVERSÉ (miroir)'}</span>`);

  if (etat.transfo === 'axialeV') {
    const d = Math.abs(A.x - etat.axeX);
    l.push(`<span class="fnote">A et A′ sont à la même distance de l'axe (${arrondi(d)} carreaux), de part et d'autre.</span>`);
  } else if (etat.transfo === 'centrale') {
    l.push(`<span class="fnote">O est le milieu de [AA′] : A, O et A′ sont alignés.</span>`);
  } else if (etat.transfo === 'translation') {
    l.push(`<span class="fnote">Tous les points glissent du même vecteur (${etat.vecteur.x >= 0 ? '+' : ''}${etat.vecteur.x} ; ${etat.vecteur.y >= 0 ? '+' : ''}${etat.vecteur.y}).</span>`);
  } else {
    l.push(`<span class="fmath">OA = OA′ = ${arrondi(dist(A, etat.centre))}</span>`);
    l.push(`<span class="fnote">A′ est l'image de A par la rotation de centre O et d'angle ${etat.angle}°.</span>`);
  }
  l.push('<button class="flex" id="btn-lexique">📖 Lexique des termes</button>');
  const html = l.join('');
  if (f.dataset.prec !== html) {
    f.dataset.prec = html;
    f.innerHTML = html;
    document.getElementById('btn-lexique').addEventListener('click', ouvrirLexique);
  }
}

  formuleVisible = !formuleVisible;

  majFormule();
});

  },
  {
    titre: 'Translation exacte',
    outils: ['axialeV', 'centrale', 'translation'],
    etapes: [
      { texte: "Règle le vecteur pour qu'il vaille exactement (+6 ; +3). Vérifie dans le panneau 📐 que A (2 ; 2) devient A′ (8 ; 5).",
        test: () => etat.transfo === 'translation' && etat.vecteur.x === 6 && etat.vecteur.y === 3 },
    ],
    retenir: "Une translation s'écrit avec ses coordonnées : (+6 ; +3) veut dire « 6 carreaux vers la droite, 3 vers le haut ». Pour trouver A′, on ajoute simplement : (2+6 ; 2+3) = (8 ; 5).",
    indice: "Le vecteur part du point (1 ; 8) : amène sa pointe sur (7 ; 11). L'étiquette doit afficher (+6 ; +3).",
    diags: [
      { si: () => suivi.vecteurNul,
        msg: "Vecteur nul : la figure ne bouge plus du tout ! Chaque point est alors son propre image." },
    ],
  },
  {
    titre: 'Le pivot',
    outils: ['axialeV', 'centrale', 'translation', 'rotation'],
    etapes: [
      { texte: "Dernière transformation : la rotation ! Choisis-la, puis fais tourner la figure en déplaçant le centre O.",
        test: () => etat.transfo === 'rotation' && suivi.centresEssayes.size >= 3 },
    ],
    retenir: "La rotation fait pivoter la figure autour du centre O, d'un certain angle. Chaque point garde sa distance à O (OA = OA′) : il se déplace sur un arc de cercle — regarde les arcs en pointillés !",
    indice: "Touche « 🔄 Rotation », puis glisse le point O.",
    diags: [
      { si: () => etat.transfo !== 'rotation', msg: "Choisis d'abord la rotation (🔄) dans la barre du bas." },
    ],
  },
  {
    titre: "Change l'angle",
    outils: ['axialeV', 'centrale', 'translation', 'rotation'],
    etapes: [
      { texte: "Touche le bouton « 📐 Angle » pour essayer 180°, 270°, puis −90°. Observe comme la figure pivote !",
        test: () => suivi.anglesEssayes.size >= 3 },
    ],
    retenir: "L'angle donne l'ampleur du pivot. Un angle positif tourne dans le sens direct (antihoraire, l'inverse des aiguilles d'une montre) ; un angle négatif tourne dans le sens des aiguilles.",
    indice: "Le bouton 📐 Angle est dans la barre du bas, il n'apparaît qu'en mode rotation.",
  },
  {
    titre: 'La grande découverte',
    outils: ['axialeV', 'centrale', 'translation', 'rotation'],
    etapes: [
      { texte: "Mets la rotation à 180°, puis compare avec la symétrie centrale (même centre O)… Que remarques-tu ?",
        test: () => suivi.rot180Faite && suivi.transfosVues.includes('centrale') && suivi.transfosVues.includes('rotation') },
    ],
    retenir: "La rotation de 180° donne EXACTEMENT la même image que la symétrie centrale de même centre ! C'est pour cela qu'on appelle la symétrie centrale un « demi-tour ». Deux transformations, un seul résultat.",
    indice: "Rotation → 📐 Angle jusqu'à 180°. Puis bascule sur 🎯 Sym. centrale : l'image ne bouge pas !",
  },
  {
    titre: 'Toutes conservent',
    outils: ['axialeV', 'centrale', 'translation', 'rotation'],
    etapes: [
      { texte: "Essaie les 4 transformations l'une après l'autre en surveillant le panneau 📐 : longueurs et aires changent-elles ?",
        test: () => suivi.transfosVues.length >= 4 },
    ],
    retenir: "Les 4 transformations conservent les longueurs, les angles et les aires : l'image est toujours SUPERPOSABLE à la figure de départ. Seule la symétrie axiale retourne la figure (comme un miroir).",
    indice: "Touche successivement 🪞, 🎯, ➡️ et 🔄 en regardant les lignes « AB = A′B′ » et « aire ».",
  },
  {
    titre: 'Défi : la cible',
    outils: ['axialeV', 'centrale', 'translation', 'rotation'],
    etapes: [
      { texte: "Défi final : par une SYMÉTRIE CENTRALE, envoie le sommet A (2 ; 2) exactement sur le point A′ (14 ; 8). À toi de trouver le centre O !",
        test: () => {
          if (etat.transfo !== 'centrale') return false;
          const a = img0();
          return Math.abs(a.x - 14) < 0.01 && Math.abs(a.y - 8) < 0.01;
        } },
    ],
    retenir: "Bravo, parcours terminé 💪 Le centre cherché était (8 ; 5) : le MILIEU de [AA′] — car x = (2+14)÷2 = 8 et y = (2+8)÷2 = 5. Tu viens d'utiliser la propriété-clé de la symétrie centrale pour résoudre un problème. C'est ça, faire des maths !",
    indice: "O doit être le milieu de [AA′]. Le milieu, c'est la moyenne des coordonnées : ((2+14)÷2 ; (2+8)÷2).",
    diags: [
      { si: () => etat.transfo !== 'centrale', msg: "Le défi demande une SYMÉTRIE CENTRALE (🎯)." },
    ],
  },
];

const LECONS = [
  "Bienvenue en géométrie ! La figure bleue est ta figure de départ. La rouge est son IMAGE par une transformation. Commençons par la plus familière : le miroir.",
  "Que se passe-t-il si l'axe du miroir touche la figure elle-même ? Un point sur le miroir… reste sur place. Vérifions !",
  "Un miroir a une particularité troublante : il inverse la gauche et la droite. En géométrie, on dit qu'il change le SENS de la figure.",
  "Deuxième transformation : la symétrie centrale. Cette fois, plus de miroir, mais un point : le centre O. La figure fait un demi-tour autour de lui.",
  "Le centre O peut être n'importe où dans le plan… même sur la figure ! Que devient alors le point qui se trouve pile dessus ?",
  "Troisième transformation : la translation. Là, rien ne tourne, rien ne se retourne : tout GLISSE. Comme un tapis qu'on pousse.",
  "Une translation se décrit par deux nombres : combien de carreaux vers la droite, combien vers le haut. C'est ce qu'on appelle un vecteur.",
  "Dernière transformation : la rotation. Un point fixe (le centre), un angle, et la figure pivote — comme l'aiguille d'une horloge autour de son axe.",
  "L'angle de rotation peut valoir 90°, 180°, 270°… ou même être négatif ! Un angle négatif, c'est tourner dans l'autre sens.",
  "Attention, tu vas découvrir un secret que beaucoup d'élèves de 3ᵉ ignorent encore : deux de ces transformations sont en réalité la MÊME…",
  "Ce que ces quatre transformations ont en commun est plus important que ce qui les distingue. Le panneau 📐 le crie depuis le début — l'as-tu remarqué ?",
  "Le grand test : ne plus subir la transformation, mais la CHOISIR pour atteindre un but précis. C'est exactement ce qu'on te demandera à l'évaluation.",
];

/* ---- Moteur de progression (socle IKE) ---- */
const progression = { m: 0, etape: 0, faites: [] };

function chargerProgression() {
  try {
    const d = JSON.parse(localStorage.getItem('ike-transfo-progression'));
    if (d) {
      if (d.m === 'libre' || (Number.isInteger(d.m) && d.m >= 0 && d.m < MISSIONS.length))
        progression.m = d.m;
      if (Array.isArray(d.faites)) progression.faites = d.faites.filter(Number.isInteger);
    }
  } catch (e) {}
}
function sauverProgression() {
  try {
    localStorage.setItem('ike-transfo-progression',
      JSON.stringify({ m: progression.m, faites: progression.faites }));
  } catch (e) {}
}
function missionCourante() { return progression.m === 'libre' ? null : MISSIONS[progression.m]; }
function outilsAutorises() {
  const m = missionCourante();
  return m ? m.outils : TRANSFOS.map(t => t.id);
}

function ouvrirLecon() {
  const m = missionCourante();
  if (!m || !LECONS[progression.m]) return;
  document.getElementById('mlecon-titre').textContent =
    `Mission ${progression.m + 1} — ${m.titre}`;
  document.getElementById('mlecon-texte').textContent = LECONS[progression.m];
  document.getElementById('mlecon').classList.add('visible');
}
document.getElementById('btn-go-lecon').addEventListener('click', fermerVoiles);

function evaluerMission() {
  const m = missionCourante();
  if (!m || progression.etape >= m.etapes.length) return;
  if (document.querySelector('.voile.visible')) return;
  let avance = false;
  while (progression.etape < m.etapes.length && m.etapes[progression.etape].test()) {
    progression.etape++;
    avance = true;
  }
  if (!avance) { majDiagnostic(m); return; }
  masquerDiagnostic();
  resetEtapeTimer();
  if (progression.etape >= m.etapes.length) {
    if (!progression.faites.includes(progression.m)) {
      progression.faites.push(progression.m);
      sauverProgression();
    }
    toast('🎉 Mission réussie ! Observe la figure…');
    const mACeMoment = progression.m;
    setTimeout(() => {
      if (progression.m === mACeMoment && !document.querySelector('.voile.visible'))
        ouvrirFin(m);
    }, 2100);
  } else {
    toast(`✅ Étape ${progression.etape} réussie !`);
    const bar = document.getElementById('mbar');
    bar.classList.remove('flash'); void bar.offsetWidth; bar.classList.add('flash');
  }
  majMissionBar();
}

function majDiagnostic(m) {
  const d = document.getElementById('mdiag');
  const hit = (m.diags || []).find(x => x.si());
  if (!hit) { masquerDiagnostic(); return; }
  const msg = '🤔 ' + hit.msg;
  if (d.textContent !== msg || !d.classList.contains('visible')) {
    d.textContent = msg;
    d.classList.add('visible');
    redimensionner();
  }
}
function masquerDiagnostic() {
  const d = document.getElementById('mdiag');
  if (d.classList.contains('visible')) { d.classList.remove('visible'); redimensionner(); }
}

function allerMission(m) {
  progression.m = m;
  progression.etape = 0;
  sauverProgression();
  resetEtapeTimer();
  masquerDiagnostic();
  fermerVoiles();
  document.getElementById('mindice').classList.remove('visible');
  const autorises = outilsAutorises();
  if (!autorises.includes(etat.transfo)) etat.transfo = autorises[0];
  resetSuivi();
  majPalette();
  majMissionBar();
  demanderRendu(); majFormule();
  if (m !== 'libre') ouvrirLecon();
}

function majMissionBar() {
  const m = missionCourante();
  const l2 = document.querySelector('#mbar .l2');
  if (!m) {
    document.getElementById('mchip').textContent = '🧪';
    document.getElementById('mtitre').textContent = 'Mode libre — explore !';
    l2.style.display = 'none';
  } else {
    document.getElementById('mchip').textContent = `Mission ${progression.m + 1}/${MISSIONS.length}`;
    document.getElementById('mtitre').textContent = m.titre;
    l2.style.display = '';
    const fini = progression.etape >= m.etapes.length;
    const pts = document.getElementById('mpoints');
    pts.innerHTML = '';
    if (m.etapes.length > 1) {
      m.etapes.forEach((e2, i) => {
        const p = document.createElement('span');
        p.className = 'pt' + (i < progression.etape ? ' faite' : i === progression.etape ? ' courante' : '');
        pts.appendChild(p);
      });
    }
    const metape = document.getElementById('metape');
    metape.textContent = fini ? '🎉 Mission terminée ! Passe à la suivante.' : m.etapes[progression.etape].texte;
    metape.classList.remove('glisse'); void metape.offsetWidth; metape.classList.add('glisse');
    document.getElementById('mcompteur').textContent =
      m.etapes.length > 1 && !fini ? `étape ${progression.etape + 1}/${m.etapes.length}` : '';
    document.getElementById('mindice').textContent = '💡 ' + m.indice;
    document.getElementById('btn-indice').style.display = fini ? 'none' : '';
    document.getElementById('btn-suiv2').style.display = fini ? '' : 'none';
  }
  redimensionner();
}

function fermerVoiles() {
  for (const v of document.querySelectorAll('.voile')) v.classList.remove('visible');
}

function ouvrirFin(m) {
  const derniere = progression.m === MISSIONS.length - 1;
  document.getElementById('mfin-titre').textContent = `Mission ${progression.m + 1} — ${m.titre}`;
  document.getElementById('mfin-retenir').textContent = m.retenir;
  document.getElementById('btn-suivante').textContent =
    derniere ? '🧪 Continuer en Mode libre' : 'Mission suivante ▶';
  document.getElementById('mfin').classList.add('visible');
}

document.getElementById('btn-suivante').addEventListener('click', () => {
  const derniere = progression.m === MISSIONS.length - 1;
  allerMission(derniere ? 'libre' : progression.m + 1);
});
document.getElementById('btn-suiv2').addEventListener('click', () => {
  const derniere = progression.m === MISSIONS.length - 1;
  allerMission(derniere ? 'libre' : progression.m + 1);
});
document.getElementById('btn-liste2').addEventListener('click', () => { fermerVoiles(); ouvrirListe(); });
document.getElementById('btn-fermer-fin').addEventListener('click', fermerVoiles);

function ouvrirListe() {
  const cont = document.getElementById('mliste-items');
  cont.innerHTML = '';
  MISSIONS.forEach((m, i) => {
    const row = document.createElement('button');
    row.className = 'mrow'
      + (progression.faites.includes(i) ? ' faite' : '')
      + (progression.m === i ? ' courante' : '');
    const n = document.createElement('span');
    n.className = 'n';
    n.textContent = progression.faites.includes(i) ? '✓' : (i + 1) + '.';
    const t = document.createElement('span');
    t.className = 't';
    t.textContent = m.titre;
    row.append(n, t);
    row.addEventListener('click', () => allerMission(i));
    cont.appendChild(row);
  });
  document.getElementById('mliste').classList.add('visible');
}

document.getElementById('btn-missions').addEventListener('click', ouvrirListe);
document.getElementById('btn-libre').addEventListener('click', () => allerMission('libre'));
document.getElementById('btn-fermer-liste').addEventListener('click', fermerVoiles);

const btnResetProg = document.getElementById('btn-reset-prog');
let confirmReset = null;
btnResetProg.addEventListener('click', () => {
  if (confirmReset) {
    clearTimeout(confirmReset); confirmReset = null;
    btnResetProg.textContent = '↺ Réinitialiser tout le parcours';
    progression.faites = [];
    allerMission(0);
    try { localStorage.removeItem('ike-transfo-visite'); } catch (e) {}
    lancerVisite();
  } else {
    btnResetProg.textContent = 'Sûr ? Touche encore une fois';
    confirmReset = setTimeout(() => {
      confirmReset = null;
      btnResetProg.textContent = '↺ Réinitialiser tout le parcours';
    }, 2500);
  }
});

for (const v of document.querySelectorAll('.voile'))
  v.addEventListener('click', e => { if (e.target === v) v.classList.remove('visible'); });

document.getElementById('btn-indice').addEventListener('click', () => {
  document.getElementById('btn-indice').classList.remove('pulse');
  document.getElementById('mindice').classList.toggle('visible');
  redimensionner();
});

let toastTimer = null;
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('visible');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('visible'), 1900);
}

let etapeDebut = Date.now();
let coupDePouceFait = false;
function resetEtapeTimer() {
  etapeDebut = Date.now();
  coupDePouceFait = false;
  document.getElementById('btn-indice').classList.remove('pulse');
}
setInterval(() => {
  const m = missionCourante();
  if (!m || progression.etape >= m.etapes.length || visiteIdx >= 0) return;
  if (document.querySelector('.voile.visible')) return;
  if (!coupDePouceFait && Date.now() - etapeDebut > 45000) {
    coupDePouceFait = true;
    document.getElementById('btn-indice').classList.add('pulse');
    toast('💡 Besoin d\'aide ? Touche le bouton Indice !');
  }
}, 5000);

/* ---------- 9. Visite guidée ---------- */

const VISITE = [
  { cible: '#mbar', titre: '🎯 Ta mission',
    texte: "Ta mission s'affiche ici : lis l'étape en cours et réalise-la sur le quadrillage." },
  { cible: '#scene', titre: '📏 Le quadrillage',
    texte: "La figure BLEUE (ABCDE) est ta figure de départ.\nLa figure ROUGE (A′B′C′D′E′) est son IMAGE.\nL'élément VIOLET (axe, centre ou vecteur) se fait GLISSER au doigt : l'image se reconstruit aussitôt !" },
  { cible: '#palette', titre: '🔧 Les 4 transformations',
    texte: "Miroir (symétrie axiale), demi-tour (symétrie centrale), glissement (translation) et pivot (rotation). Elles se débloquent au fil des missions." },
  { cible: '#formule', titre: '📐 Les propriétés en direct',
    texte: "Ce panneau vérifie tout pour toi : les coordonnées de A et de son image A′, l'égalité des longueurs, la conservation de l'aire, et le sens de la figure. Le lien « Lexique » explique tous les termes." },
  { cible: '#btn-indice', titre: '💡 Bloqué ? Un indice !',
    texte: "Ce bouton te donne un coup de pouce pour l'étape en cours. N'hésite jamais à l'utiliser !" },
  { cible: '#btn-theme', titre: '🌙 Confort visuel',
    texte: "Bascule entre thème clair et sombre. Ton choix est mémorisé sur l'appareil." },
];
let visiteIdx = -1;
const visiteEl = document.getElementById('visite');

function lancerVisite() {
  fermerVoiles();
  visiteIdx = 0;
  visiteEl.style.display = 'block';
  montrerEtapeVisite();
}
function fermerVisite() {
  visiteIdx = -1;
  visiteEl.style.display = 'none';
  try { localStorage.setItem('ike-transfo-visite', '1'); } catch (e) {}
  if (missionCourante() && progression.etape === 0) ouvrirLecon();
}
function montrerEtapeVisite() {
  const et = VISITE[visiteIdx];
  const halo = document.getElementById('visite-halo');
  const carte = document.getElementById('visite-carte');
  let rc = null;
  if (et.cible) {
    const el = document.querySelector(et.cible);
    const r = el && el.getBoundingClientRect();
    if (r && r.width > 0) rc = r;
  }
  if (rc) {
    visiteEl.classList.remove('sombre');
    halo.style.display = 'block';
    halo.style.left = (rc.left - 6) + 'px';
    halo.style.top = (rc.top - 6) + 'px';
    halo.style.width = (rc.width + 12) + 'px';
    halo.style.height = (rc.height + 12) + 'px';
  } else {
    visiteEl.classList.add('sombre');
    halo.style.display = 'none';
  }
  carte.querySelector('.vtitre').textContent = et.titre;
  carte.querySelector('.vtexte').textContent = et.texte;
  carte.querySelector('.vprog').textContent = `${visiteIdx + 1}/${VISITE.length}`;
  document.getElementById('visite-suivant').textContent =
    visiteIdx === VISITE.length - 1 ? "C'est parti !" : 'Suivant';
  requestAnimationFrame(() => {
    const cw = carte.offsetWidth, ch = carte.offsetHeight;
    let x, y;
    if (rc) {
      y = rc.bottom + 14;
      if (y + ch > window.innerHeight - 10) y = rc.top - ch - 14;
      if (y < 10) y = Math.max(10, (window.innerHeight - ch) / 2);
      x = Math.max(10, Math.min(window.innerWidth - cw - 10, rc.left + rc.width / 2 - cw / 2));
    } else {
      x = (window.innerWidth - cw) / 2;
      y = (window.innerHeight - ch) / 2;
    }
    carte.style.left = x + 'px';
    carte.style.top = y + 'px';
  });
}
document.getElementById('visite-suivant').addEventListener('click', () => {
  visiteIdx++;
  if (visiteIdx >= VISITE.length) fermerVisite(); else montrerEtapeVisite();
});
document.getElementById('visite-passer').addEventListener('click', fermerVisite);
visiteEl.addEventListener('click', e => {
  if (e.target === visiteEl || e.target.id === 'visite-halo')
    document.getElementById('visite-suivant').click();
});
window.addEventListener('resize', () => { if (visiteIdx >= 0) montrerEtapeVisite(); });
document.getElementById('btn-aide').addEventListener('click', lancerVisite);

/* ---------- 10. Thème & démarrage ---------- */

function appliquerTheme() {
  document.body.classList.toggle('sombre', etat.theme === 'sombre');
  document.getElementById('btn-theme').innerHTML =
    etat.theme === 'sombre' ? '☀️<span class="lbl"> Clair</span>' : '🌙<span class="lbl"> Sombre</span>';
  demanderRendu();
}
document.getElementById('btn-theme').addEventListener('click', () => {
  etat.theme = etat.theme === 'sombre' ? 'clair' : 'sombre';
  try { localStorage.setItem('ike-theme', etat.theme); } catch (e) {}
  appliquerTheme();
});
try {
  const memo = localStorage.getItem('ike-theme') || localStorage.getItem('ike-circuit-theme');
  if (memo === 'sombre' || memo === 'clair') etat.theme = memo;
  else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches)
    etat.theme = 'sombre';
} catch (e) {}

chargerProgression();
window.addEventListener('resize', redimensionner);
redimensionner();
appliquerTheme();
resetSuivi();
const autorisesInit = outilsAutorises();
if (!autorisesInit.includes(etat.transfo)) etat.transfo = autorisesInit[0];
majPalette();
majMissionBar();
majFormule();
requestAnimationFrame(boucle);

setTimeout(() => {
  const s = document.getElementById('splash');
  s.classList.add('fini');
  setTimeout(() => s.remove(), 600);
  try {
    if (!localStorage.getItem('ike-transfo-visite')) lancerVisite();
    else if (missionCourante() && progression.etape === 0) ouvrirLecon();
  } catch (e) { lancerVisite(); }
}, 1400);
